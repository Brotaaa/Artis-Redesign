<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artis Login — Preview</title>
<!-- Simulate original CSS variables -->
<link rel="stylesheet" href="Artis.net - Bureau mobile_files/bootstrap.min.css">
<link rel="stylesheet" href="Artis.net - Bureau mobile_files/composants.css">
<!-- Extension overrides -->
<link rel="stylesheet" href="extension/login-override.css">
<style>
  /* Minimal stubs for MDI icons used in the form */
  .mdi::before { font-family: sans-serif; font-style: normal; }
  .mdi-account::before { content: "👤"; font-size: 14px; }
  .mdi-lock::before    { content: "🔒"; font-size: 14px; }
  .mdi-check-bold::before { content: "✓"; }
  .mdi-information-outline::before { content: "ℹ"; }
</style>
</head>
<body class="login-page">

<div class="login-background">
  <div class="container">
    <div class="login-wrapper d-flex flex-column">

      <img src="Artis.net - Bureau mobile_files/Artis-Net-bleu-blanc.svg"
           class="mx-auto login-img" alt="Artis.net">

      <form class="form-horizontal validate" id="loginForm" novalidate>
        <div class="card mx-auto">
          <div class="card-header">
            <div class="card-text">
              <h5 class="card-title">Bureau mobile</h5>
            </div>
          </div>

          <div class="card-body">
            <div class="row form-group has-feedback has-feedback-left">
              <div class="col">
                <div class="form-control-feedback"><i class="mdi mdi-account"></i></div>
                <input type="text" tabindex="1" autocomplete="off"
                       placeholder="Identifiant" class="form-control">
              </div>
            </div>

            <div class="row form-group has-feedback has-feedback-left">
              <div class="col">
                <div class="form-control-feedback"><i class="mdi mdi-lock"></i></div>
                <input type="password" tabindex="2" autocomplete="off"
                       placeholder="Mot de passe" class="form-control">
              </div>
            </div>

            <div class="row form-actions">
              <div class="col d-flex align-items-center">
                <label class="checkbox-label">
                  <span class="checkbox"><i class="mdi mdi-check-bold"></i></span>
                  Rester connecté
                </label>
              </div>
              <div class="col btn-action-login">
                <div class="btn-group ms-auto">
                  <a href="#" class="btn btn-info btn-raised">SSO</a>
                  <button type="submit" class="btn btn-info btn-raised">Entrer</button>
                  <button type="button" class="btn btn-info btn-icon btn-raised"
                          aria-label="A propos">
                    <i class="mdi mdi-information-outline"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="card-footer flex-wrap justify-content-around">
            <a href="#">Mot de passe oublié ?</a>
          </div>
        </div>
      </form>

    </div>
  </div>
</div>

<script src="extension/content.js"></script>
</body>
</html>
